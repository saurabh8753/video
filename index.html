<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Tera Default Player</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- IMA SDK -->
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
}
body{
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:system-ui,Segoe UI;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.main-card{
  width:100%;
  max-width:1000px;
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}
.video-section{
  position:relative;
  background:#000;
}

/* Invisible ad trigger */
#adLayer{
  position:absolute;
  inset:0;
  z-index:10;
  cursor:pointer;
}

/* VAST container */
#adContainer{
  position:absolute;
  inset:0;
  z-index:20;
}

/* Slider ad */
#sliderAd{
  position:absolute;
  bottom:0;
  width:100%;
  z-index:15;
}

.buffering{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.4);
  z-index:5;
}
.buffering i{font-size:46px;}

video{
  width:100%;
  background:#000;
}

.content{
  padding:22px;
}
.title{
  font-size:1.3rem;
  margin-bottom:12px;
}
.meta{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
  background:rgba(255,255,255,.05);
  padding:14px;
  border-radius:12px;
  margin-bottom:18px;
}
.meta div{
  font-size:.9rem;
  color:#94a3b8;
}
.actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.btn{
  flex:1;
  min-width:200px;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#fff;
}
.download{background:#3b82f6}
.fast{background:#10b981}

/* Banner */
#bannerAd{
  width:100%;
  text-align:center;
  margin:10px 0;
}

#loading{
  padding:100px;
  text-align:center;
}
</style>
</head>

<body>

<div class="main-card" id="app">
  <div id="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading Video...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
async function loadVideo(){

const app=document.getElementById("app");
const videoUrl=new URLSearchParams(location.search).get("url");

if(!videoUrl){
  app.innerHTML="<div style='padding:40px;text-align:center'>No URL Found</div>";
  return;
}

const res=await fetch(`https://ztera.yaartunah.workers.dev/?url=${encodeURIComponent(videoUrl)}`);
const data=await res.json();
if(data.status!=="success") return;

const file=data.list[0];
const stream=file.fast_stream_url?.["480p"] || file.stream_url;

app.innerHTML=`
<div class="video-section">

  <div id="sliderAd"></div>

  <div id="adLayer"></div>
  <div id="adContainer"></div>

  <div class="buffering" id="buffering">
    <i class="fas fa-spinner fa-spin"></i>
  </div>

  <video id="video" controls playsinline poster="${file.thumbnail}"></video>
</div>

<!-- Banner -->
<div id="bannerAd"></div>

<div class="content">
  <div class="title">${file.name}</div>

  <div class="meta">
    <div>💾 ${file.size_formatted}</div>
    <div>⏱ ${file.duration}</div>
    <div>🎥 ${file.quality}</div>
    <div>📁 ${file.folder}</div>
  </div>

  <div class="actions">
    <a class="btn download" href="${file.normal_dlink}" target="_blank">
      <i class="fas fa-download"></i> Download
    </a>
    <a class="btn fast" href="${file.zip_dlink}" target="_blank">
      <i class="fas fa-bolt"></i> Fast Download
    </a>
  </div>
</div>
`;

const video=document.getElementById("video");
const adLayer=document.getElementById("adLayer");
const adContainer=document.getElementById("adContainer");
const loader=document.getElementById("buffering");

/* HLS */
if(video.canPlayType("application/vnd.apple.mpegurl")){
  video.src=stream;
}else if(Hls.isSupported()){
  const hls=new Hls();
  hls.loadSource(stream);
  hls.attachMedia(video);
}

/* Loader */
video.addEventListener("waiting",()=>loader.style.display="flex");
video.addEventListener("playing",()=>loader.style.display="none");

/* ===== VAST ADS ===== */

const adTagUrl="https://fluffy-management.com/dimVF.zzdWGkNhvzZ/G/UC/zevm/9/uCZfUYlIkCPbTDYM5mMAjEgg5/NqzPcJtvNkjrklyEO/DfkO4gMFS/Zksba/WV1_p/d/DB0HxF";

function startAds(){

  const adDisplayContainer=new google.ima.AdDisplayContainer(adContainer,video);
  adDisplayContainer.initialize();

  const adsLoader=new google.ima.AdsLoader(adDisplayContainer);

  adsLoader.addEventListener(
    google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
    (event)=>{
      const adsManager=event.getAdsManager(video);

      adsManager.addEventListener(
        google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED,
        ()=>{
          adContainer.style.display="none";
          video.play();
        }
      );

      adsManager.addEventListener(
        google.ima.AdErrorEvent.Type.AD_ERROR,
        ()=>{
          video.play();
        }
      );

      try{
        adsManager.init(video.offsetWidth,video.offsetHeight,google.ima.ViewMode.NORMAL);
        adsManager.start();
      }catch(e){
        video.play();
      }
    }
  );

  adsLoader.addEventListener(
    google.ima.AdErrorEvent.Type.AD_ERROR,
    ()=>{
      video.play();
    }
  );

  const adsRequest=new google.ima.AdsRequest();
  adsRequest.adTagUrl=adTagUrl;
  adsRequest.linearAdSlotWidth=video.offsetWidth;
  adsRequest.linearAdSlotHeight=video.offsetHeight;

  adsLoader.requestAds(adsRequest);
}

/* Click trigger */
adLayer.addEventListener("click",()=>{
  adLayer.style.display="none";
  video.pause();
  startAds();
});

/* ===== Banner Ad ===== */
(function(){
  var d=document,s=d.createElement('script');
  s.src="//selfassured-celebration.com/bsXaVCsLd.G/lu0rY/WxcK/Ve/mB9XuVZcUzlsk/PoToYA5tMSjDkgxoM-j/EKt/N/j/k/yjOxTfESySN/QY";
  s.async=true;
  document.getElementById("bannerAd").appendChild(s);
})();

/* ===== Slider Ad ===== */
(function(){
  var d=document,s=d.createElement('script');
  s.src="//selfassured-celebration.com/b/X.VLsId/Gol/0JYWWxcu/je/mi9huPZrUclUkuPSTjYx5/MVjVkEw/NXDokvt/NIjakNylOSTnA/1kMxwT";
  s.async=true;
  document.getElementById("sliderAd").appendChild(s);
})();

}

loadVideo();
</script>

</body>
</html>
