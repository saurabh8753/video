<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Tera Player CLEAN</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
}
body{
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:system-ui,Segoe UI;
  color:#fff;
  display:flex;
  justify-content:center;
  flex-direction: column;
  align-items: center;
}
.main-card{
  width:100%;
  max-width:1000px;
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}
.video-section{position:relative;background:#000;}
.buffering{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.4);z-index:5;
}
video{width:100%;display:block;cursor:pointer;}
.content{padding:22px;}
.title{font-size:1.3rem;margin-bottom:12px;}
.meta{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
  background:rgba(255,255,255,.05);
  padding:14px;border-radius:12px;margin-bottom:18px;
}
.meta div{font-size:.9rem;color:#94a3b8;}
.actions{display:flex;gap:14px;flex-wrap:wrap;}
.btn{
  flex:1;min-width:200px;padding:14px;border-radius:12px;
  text-decoration:none;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  gap:10px;color:#fff;
}
.download{background:#3b82f6}
.fast{background:#10b981}
#loading{padding:100px;text-align:center;}

/* ✅ DELAY AD CONTAINER */
#delayedAdContainer {
  display: none;
  width: 100%;
  max-width: 1000px;
  margin-top: 20px;
  text-align: center;
}
.ad-grid {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
</style>
</head>

<body>

<div class="main-card" id="app">
  <div id="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading Video...
  </div>
</div>

<!-- ✅ ALL ADS (hidden initially, shown after 5 seconds) -->
<div id="delayedAdContainer">
  <div class="ad-grid">
    <!-- Ad 2 -->
    <script>
      atOptions = {
        'key' : '50b4b55f05148a736cd8ebf691550dbb',
        'format' : 'iframe',
        'height' : 250,
        'width' : 300,
        'params' : {}
      };
    </script>
    <script src="https://yawncollaremotion.com/50b4b55f05148a736cd8ebf691550dbb/invoke.js"></script>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

// 🔥 MULTI SMART LINKS
const SMART_LINKS = [
  "https://yawncollaremotion.com/yvc33vhcr?key=392e8fc7e7a5aa8ee592724f8804ce9a",
  "https://yawncollaremotion.com/yvc33vhcr?key=392e8fc7e7a5aa8ee592724f8804ce9a",
  "https://yawncollaremotion.com/yvc33vhcr?key=392e8fc7e7a5aa8ee592724f8804ce9a"
];

// 🎲 RANDOM ROTATION
function getSmartLink(){
  return SMART_LINKS[Math.floor(Math.random()*SMART_LINKS.length)];
}

async function loadVideo(){

  const app=document.getElementById("app");
  const videoUrl=new URLSearchParams(location.search).get("url");

  if(!videoUrl){
    app.innerHTML="<div style='padding:40px;text-align:center'>No URL Found</div>";
    return;
  }

  try{

    const api=`https://ztera.yaartunah.workers.dev/?url=${encodeURIComponent(videoUrl)}`;
    const res=await fetch(api);
    const data=await res.json();

    if(data.status!=="success" || !data.list?.length){
      app.innerHTML="<div style='padding:40px;text-align:center'>Failed to load video</div>";
      return;
    }

    const file=data.list[0];

    const stream = file.fast_stream_url?.["480p"] 
                || file.fast_stream_url?.["360p"] 
                || file.stream_url 
                || "";

    app.innerHTML=`
    <div class="video-section">
      <div class="buffering" id="buffering">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <!-- Custom overlay to catch the very first click on mobile/desktop cleanly -->
      <div id="playerOverlay" style="position:absolute; inset:0; z-index:4; cursor:pointer; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.1);">
        <div style="background:rgba(0,0,0,0.7); width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff;"><i class="fas fa-play" style="margin-left:4px;"></i></div>
      </div>
      <video id="video" controls playsinline poster="${file.thumbnail || ''}"></video>
    </div>

    <div class="content">
      <div class="title">${file.name}</div>

      <div class="meta">
        <div>💾 ${file.size_formatted || '-'}</div>
        <div>⏱ ${file.duration || '-'}</div>
        <div>🎥 ${file.quality || '-'}</div>
        <div>📁 ${file.folder || '-'}</div>
      </div>

      <div class="actions">
        <a class="btn download" href="#" id="downloadBtn">
          <i class="fas fa-download"></i> Download
        </a>

        <a class="btn fast" href="#" id="fastBtn">
          <i class="fas fa-bolt"></i> Fast Download
        </a>
      </div>
    </div>
    `;

    const video=document.getElementById("video");
    const loader=document.getElementById("buffering");
    const overlay=document.getElementById("playerOverlay");

    // 🎬 HLS Loader
    if(video.canPlayType("application/vnd.apple.mpegurl")){
      video.src=stream;
    }else if(Hls.isSupported()){
      const hls=new Hls();
      hls.loadSource(stream);
      hls.attachMedia(video);
    }

    // 🔄 Buffer UI
    video.addEventListener("waiting",()=>loader.style.display="flex");
    video.addEventListener("playing",()=>loader.style.display="none");
    video.addEventListener("canplay",()=>loader.style.display="none");

    // 🎯 FIRST CLICK ON VIDEO: OPEN AD + PLAY VIDEO
    if(overlay){
      overlay.addEventListener("click",(e)=>{
        e.stopPropagation();
        
        // 1. Open Smart link in new tab
        window.open(getSmartLink(), "_blank");
        
        // 2. Remove overlay so user can access standard video controls
        overlay.style.display = "none";
        
        // 3. Play the video
        video.play().catch(()=>{});
      });
    }

    // ⬇️ DOWNLOAD BUTTONS (DIRECT DOWNLOADS ONLY)
    const downloadBtn=document.getElementById("downloadBtn");
    const fastBtn=document.getElementById("fastBtn");

    downloadBtn.addEventListener("click",(e)=>{
      e.preventDefault();
      window.location.href = file.normal_dlink;
    });

    fastBtn.addEventListener("click",(e)=>{
      e.preventDefault();
      window.location.href = file.zip_dlink;
    });

    // 📱 FULLSCREEN ROTATE
    document.addEventListener("fullscreenchange",()=>{
      if(!document.fullscreenElement){
        screen.orientation?.unlock?.();
        return;
      }
      if(video.videoWidth > video.videoHeight){
        screen.orientation?.lock("landscape").catch(()=>{});
      }
    });

  }catch(e){
    app.innerHTML="<div style='padding:40px;text-align:center'>Error loading video</div>";
  }
}

loadVideo();

/* ⏱️ 5 SECOND DELAY FOR ADS */
setTimeout(()=>{
  const adContainer = document.getElementById("delayedAdContainer");
  if(adContainer){
    adContainer.style.display = "block";
  }
}, 5000);
</script>

</body>
</html>
