<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Tera Player</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#0f172a;
  font-family:system-ui;
  color:#fff;
  display:flex;
  justify-content:center;
}
.main-card{
  width:100%;
  max-width:900px;
  background:#1e293b;
  border-radius:16px;
  overflow:hidden;
}
.video-section{
  position:relative;
  background:#000;
}
#adContainer{
  position:absolute;
  width:100%;
  height:100%;
  z-index:10;
}
#playBtn{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.5);
  z-index:20;
  cursor:pointer;
}
#playBtn i{
  font-size:60px;
}
video{width:100%;}
.content{padding:20px;}
.btn{
  display:inline-block;
  padding:12px;
  margin:5px;
  background:#3b82f6;
  color:#fff;
  border-radius:10px;
  text-decoration:none;
}
.fast{background:#10b981;}

/* Banner */
#bannerAd{
  width:100%;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="main-card" id="app">
  <div style="padding:50px;text-align:center">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
async function loadVideo(){

const app=document.getElementById("app");
const videoUrl=new URLSearchParams(location.search).get("url");

if(!videoUrl){
  app.innerHTML="No URL";
  return;
}

const res=await fetch(`https://ztera.yaartunah.workers.dev/?url=${encodeURIComponent(videoUrl)}`);
const data=await res.json();

if(data.status!=="success") return;

const file=data.list[0];
const stream=file.fast_stream_url?.["480p"] || file.stream_url;

app.innerHTML=`
<div class="video-section">
  <div id="adContainer"></div>

  <div id="playBtn">
    <i class="fas fa-play"></i>
  </div>

  <video id="video" playsinline poster="${file.thumbnail}"></video>
</div>

<div id="bannerAd"></div>

<div class="content">
  <h3>${file.name}</h3>

  <a class="btn" href="${file.normal_dlink}" target="_blank">Download</a>
  <a class="btn fast" href="${file.zip_dlink}" target="_blank">Fast Download</a>
</div>
`;

const video=document.getElementById("video");
const playBtn=document.getElementById("playBtn");
const adContainer=document.getElementById("adContainer");

/* ===== HLS ===== */
if(video.canPlayType("application/vnd.apple.mpegurl")){
  video.src=stream;
}else if(Hls.isSupported()){
  const hls=new Hls();
  hls.loadSource(stream);
  hls.attachMedia(video);
}

/* ===== ADS ===== */

const adTagUrl="https://fluffy-management.com/dimVF.zzdWGkNhvzZ/G/UC/zevm/9/uCZfUYlIkCPbTDYM5mMAjEgg5/NqzPcJtvNkjrklyEO/DfkO4gMFS/Zksba/WV1_p/d/DB0HxF";

let adsLoader, adsManager, adDisplayContainer;

function startAds(){

  adDisplayContainer=new google.ima.AdDisplayContainer(adContainer,video);
  adDisplayContainer.initialize();

  adsLoader=new google.ima.AdsLoader(adDisplayContainer);

  adsLoader.addEventListener(
    google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
    (event)=>{

      adsManager=event.getAdsManager(video);

      adsManager.addEventListener(
        google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED,
        ()=>{
          adContainer.style.display="none";
          video.controls=true;
          video.play();
          loadExtraAds(); // ✅ after ad
        }
      );

      adsManager.addEventListener(
        google.ima.AdErrorEvent.Type.AD_ERROR,
        ()=>{
          startVideo();
        }
      );

      try{
        adsManager.init(video.offsetWidth,video.offsetHeight,google.ima.ViewMode.NORMAL);
        adsManager.start();
      }catch(e){
        startVideo();
      }
    }
  );

  adsLoader.addEventListener(
    google.ima.AdErrorEvent.Type.AD_ERROR,
    ()=>{
      startVideo();
    }
  );

  const adsRequest=new google.ima.AdsRequest();
  adsRequest.adTagUrl=adTagUrl;
  adsLoader.requestAds(adsRequest);
}

function startVideo(){
  adContainer.style.display="none";
  video.controls=true;
  video.play();
  loadExtraAds(); // ✅ fallback
}

/* ===== SAFE EXTRA ADS LOAD ===== */
function loadExtraAds(){

  // Banner
  setTimeout(()=>{
    var s=document.createElement('script');
    s.src="//selfassured-celebration.com/bsXaVCsLd.G/lu0rY/WxcK/Ve/mB9XuVZcUzlsk/PoToYA5tMSjDkgxoM-j/EKt/N/j/k/yjOxTfESySN/QY";
    s.async=true;
    document.getElementById("bannerAd").appendChild(s);
  },2000);

  // Slider (safe: body me inject)
  setTimeout(()=>{
    var s=document.createElement('script');
    s.src="//selfassured-celebration.com/b/X.VLsId/Gol/0JYWWxcu/je/mi9huPZrUclUkuPSTjYx5/MVjVkEw/NXDokvt/NIjakNylOSTnA/1kMxwT";
    s.async=true;
    document.body.appendChild(s);
  },3000);

}

/* ===== CLICK ===== */
playBtn.addEventListener("click",()=>{
  playBtn.style.display="none";
  startAds();
});

}

loadVideo();
</script>

</body>
</html>
