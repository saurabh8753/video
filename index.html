<script>

// ──────────────────────────────────────────────
// 🔥 MULTI SMART LINKS (unchanged)
// ──────────────────────────────────────────────
const SMART_LINKS = [
  "https://yawncollaremotion.com/yvc33vhcr?key=392e8fc7e7a5aa8ee592724f8804ce9a",
  "https://yawncollaremotion.com/yvc33vhcr?key=392e8fc7e7a5aa8ee592724f8804ce9a",
  "https://yawncollaremotion.com/yvc33vhcr?key=392e8fc7e7a5aa8ee592724f8804ce9a"
];

function getSmartLink(){
  return SMART_LINKS[Math.floor(Math.random()*SMART_LINKS.length)];
}

// ──────────────────────────────────────────────
// ✅ DAILY LIMIT & SHARE UNLOCK SYSTEM
// ──────────────────────────────────────────────
const DAILY_LIMIT = 5;                // free videos per day
const STORAGE_KEY = 'ztera_daily_usage';

function getDailyData() {
  const today = new Date().toISOString().split('T')[0];
  let data;
  try {
    data = JSON.parse(localStorage.getItem(STORAGE_KEY));
  } catch(e) {
    data = null;
  }
  // reset if missing or old date
  if (!data || data.date !== today) {
    data = { date: today, videosPlayed: 0, unlocked: false };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  return data;
}

function saveDailyData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function incrementPlayCount(data) {
  // only count if not already unlocked (unlimited mode doesn't increase counter)
  if (!data.unlocked) {
    data.videosPlayed += 1;
    saveDailyData(data);
  }
}

// Check if playback is allowed (unlocked or under limit)
function canPlayVideo(data) {
  return data.unlocked || data.videosPlayed < DAILY_LIMIT;
}

function showLimitModal(data) {
  document.getElementById('watchedCount').textContent = data.videosPlayed;
  document.getElementById('limitOverlay').classList.add('show');
}

function hideLimitModal() {
  document.getElementById('limitOverlay').classList.remove('show');
}

// ──────────────────────────────────────────────
// 🎬 MAIN VIDEO LOADER (unchanged core, with daily limit integration)
// ──────────────────────────────────────────────
async function loadVideo(){

  const app=document.getElementById("app");
  const videoUrl=new URLSearchParams(location.search).get("url");

  if(!videoUrl){
    app.innerHTML="<div style='padding:40px;text-align:center'>No URL Found</div>";
    return;
  }

  // ── Get today's usage BEFORE showing anything ──
  const currentData = getDailyData();
  // update the "watched count" in modal even if not shown yet
  document.getElementById('watchedCount').textContent = currentData.videosPlayed;

  try{

    const api=`https://ztera.yaartunah.workers.dev/?url=${encodeURIComponent(videoUrl)}`;
    const res=await fetch(api);
    const data=await res.json();

    if(data.status!=="success" || !data.list?.length){
      app.innerHTML="<div style='padding:40px;text-align:center'>Failed to load video</div>";
      return;
    }

    const file=data.list[0];

    const stream = file.fast_stream_url?.["480p"] 
                || file.fast_stream_url?.["360p"] 
                || file.stream_url 
                || "";

    app.innerHTML=`
    <div class="video-section">
      <div class="buffering" id="buffering">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <video id="video" controls playsinline poster="${file.thumbnail || ''}"></video>
    </div>

    <div class="content">
      <div class="title">${file.name}</div>

      <div class="meta">
        <div>💾 ${file.size_formatted || '-'}</div>
        <div>⏱ ${file.duration || '-'}</div>
        <div>🎥 ${file.quality || '-'}</div>
        <div>📁 ${file.folder || '-'}</div>
      </div>

      <div class="actions">
        <a class="btn download" href="#" id="downloadBtn">
          <i class="fas fa-download"></i> Download
        </a>

        <a class="btn fast" href="#" id="fastBtn">
          <i class="fas fa-bolt"></i> Fast Download
        </a>
      </div>
    </div>
    `;

    const video=document.getElementById("video");
    const loader=document.getElementById("buffering");

    // HLS setup
    if(video.canPlayType("application/vnd.apple.mpegurl")){
      video.src=stream;
    }else if(Hls.isSupported()){
      const hls=new Hls();
      hls.loadSource(stream);
      hls.attachMedia(video);
    }

    // Buffer UI
    video.addEventListener("waiting",()=>loader.style.display="flex");
    video.addEventListener("playing",()=>loader.style.display="none");
    video.addEventListener("canplay",()=>loader.style.display="none");

    // ──────────────────────────────────────────
    // 🧠 DAILY LIMIT CHECK ON PLAY
    // ──────────────────────────────────────────
    video.addEventListener('play', function(e) {
      const dataNow = getDailyData();

      if (!canPlayVideo(dataNow)) {
        // Block playback – immediately pause and show modal
        video.pause();
        showLimitModal(dataNow);
        return;
      }

      // Allowed: if not unlocked, increment the counter
      if (!dataNow.unlocked) {
        incrementPlayCount(dataNow);
        // update displayed count in case modal opens later
        const updated = getDailyData();
        document.getElementById('watchedCount').textContent = updated.videosPlayed;
      }
    });

    // ──────────────────────────────────────────
    // ⬇️ DOWNLOAD BUTTONS (unchanged)
    // ──────────────────────────────────────────
    const downloadBtn=document.getElementById("downloadBtn");
    const fastBtn=document.getElementById("fastBtn");

    downloadBtn.addEventListener("click",(e)=>{
      e.preventDefault();
      window.open(getSmartLink(), "_blank");
      window.location.href = file.normal_dlink;
    });

    fastBtn.addEventListener("click",(e)=>{
      e.preventDefault();
      window.open(getSmartLink(), "_blank");
      window.location.href = file.zip_dlink;
    });

    // 📱 FULLSCREEN ROTATE (unchanged)
    document.addEventListener("fullscreenchange",()=>{
      if(!document.fullscreenElement){
        screen.orientation?.unlock?.();
        return;
      }
      if(video.videoWidth > video.videoHeight){
        screen.orientation?.lock("landscape").catch(()=>{});
      }
    });

  }catch(e){
    app.innerHTML="<div style='padding:40px;text-align:center'>Error loading video</div>";
  }
}

// ──────────────────────────────────────────────
// 📲 SHARE TO UNLOCK (modal button)
// ──────────────────────────────────────────────
document.getElementById('shareWhatsAppBtn').addEventListener('click', function() {
  const message = "🔥 Best Video Downloader & Player:  https://ztera.pages.dev \n📲 Download ZTERA App:  https://akpdownloadzs.blogspot.com\nTry now!";
  const encoded = encodeURIComponent(message);
  window.open(`https://wa.me/?text=${encoded}`, '_blank');

  // Unlock for the rest of the day
  const data = getDailyData();
  data.unlocked = true;
  saveDailyData(data);

  // Hide the overlay
  hideLimitModal();

  // Optional: a subtle confirmation
  // (just hide modal, user can press play again)
});

// (Prevent closing the modal without sharing – no extra close button)

// ──────────────────────────────────────────────
// 🚀 INITIAL LOAD
// ──────────────────────────────────────────────
loadVideo();

setTimeout(()=>{
  const adContainer = document.getElementById("delayedAdContainer");
  if(adContainer){
    adContainer.style.display = "block";
  }
}, 5000);
</script>
